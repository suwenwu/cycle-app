name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            command: npm run build:mac
            artifacts: dist/*.dmg
          - os: windows-latest
            command: npm run build:win
            artifacts: dist/*.exe
          - os: ubuntu-latest
            command: npm run build:linux
            artifacts: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cycle-app-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: ignore
